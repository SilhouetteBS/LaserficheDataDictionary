name: Correction or update
description: Report a documentation correction, missing detail, query issue, schema note, or community example update.
title: "Correction/update: "
labels: ["documentation", "needs-review"]
body:
  - type: dropdown
    id: correction_type
    attributes:
      label: Correction type
      options:
        - Table or column documentation
        - Relationship or diagram
        - SQL/reporting example
        - Product/version metadata
        - Missing schema object
        - UI or navigation issue
        - Other correction or update
    validations:
      required: true
  - type: input
    id: product
    attributes:
      label: Product
      description: Product affected by the correction.
      placeholder: Forms, LFDS, Repository, Workflow, or Cross-product
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Product version affected by the correction.
      placeholder: Example: 12.0.2603.30215
  - type: input
    id: area
    attributes:
      label: Page or area
      description: Where you found the issue.
      placeholder: Tables, Diagram, Objects, Impact, Health, Dependencies, Reporting
  - type: input
    id: schema_object
    attributes:
      label: Table, object, column, or example
      description: The specific table, view, routine, trigger, column, relationship, or SQL example.
      placeholder: Example: dbo.cf_bp_main_instances.status
  - type: input
    id: current_link
    attributes:
      label: Current page link
      description: Link to the Data Dictionary view where the issue was found.
      placeholder: https://silhouettebs.github.io/LaserficheDataDictionary/...
  - type: textarea
    id: current_text
    attributes:
      label: Current wording or behavior
      description: Paste or summarize what currently appears.
  - type: textarea
    id: suggested_update
    attributes:
      label: Suggested correction or update
      description: Explain what should change.
    validations:
      required: true
  - type: textarea
    id: source_context
    attributes:
      label: Source or validation context
      description: Include non-sensitive source context, version details, Answers links, or schema evidence if available.
  - type: textarea
    id: safety_acknowledgement
    attributes:
      label: Safety check
      description: Do not include row data, customer-specific values, database names, server names, credentials, production screenshots, or other sensitive details.
      value: This correction is intended for read-only reporting, troubleshooting, or education and does not include sensitive data.
