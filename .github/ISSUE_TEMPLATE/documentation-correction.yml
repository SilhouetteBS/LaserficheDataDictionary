name: Documentation correction
description: Suggest a correction to table, column, object, reporting, query, or glossary documentation.
title: "Documentation correction: "
labels: ["documentation", "needs-review"]
body:
  - type: dropdown
    id: correction_type
    attributes:
      label: Correction type
      description: What kind of Data Dictionary update is needed?
      options:
        - Table or column documentation
        - Relationship or diagram
        - SQL/reporting example
        - Product/version metadata
        - Missing schema object
        - UI or navigation issue
        - Other correction or update
    validations:
      required: true
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product is affected?
      options:
        - Forms
        - LFDS
        - Repository
        - Workflow
        - Cross-product
        - Other or unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Product version affected by the correction.
      placeholder: "Example: 12.0.2603.30215"
  - type: dropdown
    id: area
    attributes:
      label: Page or area
      description: Where did you find the issue?
      options:
        - Tables
        - Compare
        - Diagram
        - Objects
        - Impact
        - Health
        - Dependencies
        - Import
        - Reporting
        - AI export package
        - Other or unsure
  - type: input
    id: schema_object
    attributes:
      label: Table, object, column, or example
      description: The specific table, view, routine, trigger, column, relationship, or SQL example.
      placeholder: "Example: dbo.cf_bp_main_instances.status"
  - type: input
    id: current_link
    attributes:
      label: Current page link
      description: Link to the Data Dictionary view where the issue was found.
      placeholder: "https://silhouettebs.github.io/LaserficheDataDictionary/..."
  - type: textarea
    id: current_detail
    attributes:
      label: Current wording or behavior
      description: Paste or summarize what currently appears.
      placeholder: "Describe the wording, behavior, relationship, or query guidance that seems incorrect or incomplete."
  - type: textarea
    id: suggested_update
    attributes:
      label: Suggested correction or update
      description: What should be added, removed, renamed, clarified, or corrected?
      placeholder: "Describe the proposed replacement or clarification."
    validations:
      required: true
  - type: textarea
    id: source_context
    attributes:
      label: Source or validation context
      description: Include non-sensitive source context, version details, Laserfiche Answers links, documentation links, or schema evidence if available.
      placeholder: "Do not include row data, customer-specific values, database names, server names, credentials, production screenshots, or other sensitive details."
  - type: textarea
    id: safety_acknowledgement
    attributes:
      label: Safety check
      description: Confirm that the report is safe to post publicly.
      value: "This correction is intended for read-only reporting, troubleshooting, or education and does not include row data, customer-specific values, database names, server names, credentials, production screenshots, or other sensitive details."
