name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Render smoke check
        run: npm run render:check

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start app
        run: npm run dev -- --port 4177 > /tmp/lfdd-vite.log 2>&1 &

      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4177 >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/lfdd-vite.log
          exit 1

      - name: Browser smoke test
        run: npm run test:e2e
